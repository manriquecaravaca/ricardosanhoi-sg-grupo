<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Piedras Naturales</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="selector-idioma">
    <a href="index.html">Español</a> | 
    <a href="en.html">English</a>
        </nav>
        <header class="bienvenida-seccion">
    <img src="img/bienvenida.jpg" alt="Imagen de Bienvenida" class="foto-bienvenida">
    <h1>Ricardo Sánchez le da la bienvenida</h1>
    <p class="subtitulo">Explore nuestra exclusiva colección</p>
</header>
    </header>

    <main id="catalogo">
        <div class="tarjeta">
            <img src="img/onix-blanco.jpg" alt="Onix Blanco">
            <h3>ONIX Blanco</h3>
            <p>SKU: AT.117 | Grosor: 2cm</p>
            <p class="precio">$469 m²</p>
            <button onclick="agregarAlPedido('ONIX Blanco - AT.117')">Seleccionar</button>
        </div>
    </main>

    <section id="contacto">
        <h2>Solicitar Cotización</h2>
        <form id="formulario-pedido">
            <input type="text" name="nombre" placeholder="Tu Nombre" required>
            <input type="email" name="email" placeholder="Tu Correo" required>
            <textarea name="piezas" id="lista-piezas" readonly placeholder="Piezas seleccionadas..."></textarea>
            <button type="submit">Enviar Solicitud</button>
        </form>
    </section>
</body>
</html>
